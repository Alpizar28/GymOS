services:
  # ─── Backend: FastAPI + Telegram Bot (webhook mode) ────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    environment:
      - DATABASE_URL=sqlite+aiosqlite:////app/data/gym.db
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - WEBHOOK_URL=${WEBHOOK_URL}
      - WEB_URL=${WEB_URL}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - PORT=8000
    volumes:
      - gym-data:/app/data
    expose:
      - "8000" # Tells Traefik which port to proxy
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8000/api/health || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - gym-network

  # ─── Frontend: Next.js dashboard ───────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - BACKEND_URL=http://backend:8000
    expose:
      - "3000" # Tells Traefik which port to proxy
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - gym-network

networks:
  gym-network:
    driver: bridge

volumes:
  gym-data:
    driver: local
