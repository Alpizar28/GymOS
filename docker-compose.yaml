services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-postgres}
    volumes:
      - pg-data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gym-network

  # ─── Backend: FastAPI (web-only mode) ───────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://postgres:postgres@db:5432/postgres}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - WEB_URL=${WEB_URL}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - PORT=8000
      - AUTH_ENABLED=${AUTH_ENABLED:-true}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_JWT_AUDIENCE=${SUPABASE_JWT_AUDIENCE:-authenticated}
      - DEV_FALLBACK_USER_ID=${DEV_FALLBACK_USER_ID:-00000000-0000-0000-0000-000000000001}
    expose:
      - "8000"
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8000/api/health || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      db:
        condition: service_healthy
    networks:
      - gym-network

  # ─── Frontend: Next.js dashboard ───────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
      - BACKEND_URL=http://backend:8000
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
    expose:
      - "3000"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - gym-network

networks:
  gym-network:
    driver: bridge

volumes:
  pg-data:
    driver: local
