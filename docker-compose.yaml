services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    environment:
      - DATABASE_URL=sqlite+aiosqlite:////app/data/gym.db
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - WEB_URL=${WEB_URL:-http://localhost:8000}
      - LOG_LEVEL=INFO
    volumes:
      - gym-data:/app/data
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/api/exercises" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gym-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    environment:
      - NODE_ENV=production
      - BACKEND_URL=http://backend:8000
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - gym-network

networks:
  gym-network:
    driver: bridge

volumes:
  gym-data:
